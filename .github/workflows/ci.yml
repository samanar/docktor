name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  # ── Test ──────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - run: go test -v -race ./...

  # ── Build ─────────────────────────────────────────────────────────
  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Build
        run: |
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} \
            go build -ldflags="-s -w" \
            -o bin/docktor-${{ matrix.os }}-${{ matrix.arch }} \
            ./cmd/docktor/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docktor-${{ matrix.os }}-${{ matrix.arch }}
          path: bin/

  # ── Release ───────────────────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: docktor-*
          path: bin/
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## docktor ${{ github.ref_name }}

            ### Downloads

            | Platform | Architecture | Binary |
            |----------|-------------|--------|
            | Linux    | amd64       | `docktor-linux-amd64` |
            | Linux    | arm64       | `docktor-linux-arm64` |
            | macOS    | amd64       | `docktor-darwin-amd64` |
            | macOS    | arm64       | `docktor-darwin-arm64` |

            ### Installation

            Download the binary for your platform, make it executable, and run:

            ```bash
            chmod +x docktor-<os>-<arch>
            ./docktor-<os>-<arch>
            ```
          files: |
            bin/docktor-linux-amd64
            bin/docktor-linux-arm64
            bin/docktor-darwin-amd64
            bin/docktor-darwin-arm64
          generate_release_notes: true
